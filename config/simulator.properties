# Docker/local override for LLExSimulator
#
# This file is mounted into the container at /app/config/simulator.properties.
# It deliberately favours stable local testing on Docker Desktop over absolute
# lowest-possible busy-spin latency. For bare-metal benchmarking, use the
# classpath defaults (BUSY_SPIN) or tune this file per host.

# FIX Engine
fix.host=0.0.0.0
fix.port=9880
fix.log.dir=logs/quickfixj
fix.raw.message.logging.enabled=false

# Disruptor
ring.buffer.size=131072
wait.strategy=SLEEPING

# Order Repository
order.pool.size=131072

# Web Server
web.port=8080

# Aeron IPC
# Local macOS-friendly default. Docker/Linux can still prefer /dev/shm via JVM args;
# the simulator will fall back to /tmp automatically if usable shared memory is too small.
aeron.dir=/tmp/aeron-llexsim

# Artio library IPC
# Smaller IPC term buffers prevent 200 MB shared-memory allocations per publication.
artio.library.aeron.channel=aeron:ipc?term-length=8388608

# Metrics IPC
metrics.aeron.channel=aeron:ipc?term-length=65536

# Metrics
metrics.publish.interval=500

