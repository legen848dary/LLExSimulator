# ?? FIX Engine (QuickFIX/J) ???????????????????????????????????????????????????
fix.host=0.0.0.0
fix.port=9880
fix.log.dir=logs/quickfixj

# ?? Disruptor ?????????????????????????????????????????????????????????????????
# Ring buffer size MUST be a power of 2
ring.buffer.size=131072
# BUSY_SPIN for lowest latency (uses 100% of one core); SLEEPING for lower CPU
wait.strategy=BUSY_SPIN

# ?? Order Repository ?????????????????????????????????????????????????????????
order.pool.size=16384

# ?? Web Server ????????????????????????????????????????????????????????????????
web.port=8080

# ?? Aeron IPC (metrics pipeline) ?????????????????????????????????????????????
# Use /dev/shm on Linux for tmpfs-backed memory-mapped files
aeron.dir=/dev/shm/aeron-llexsim

# ?? Metrics ???????????????????????????????????????????????????????????????????
# Publish a MetricsSnapshot to WebSocket every N processed orders
metrics.publish.interval=500

